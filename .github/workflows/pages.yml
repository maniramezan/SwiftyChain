name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Restore SwiftPM caches
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.4.1-swiftpm-pages-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.4.1-swiftpm-pages-
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.4.1-swiftpm-

      - name: Build DocC site
        run: |
          xcrun swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target SwiftyChain \
            --output-path ./docs \
            --warnings-as-errors \
            --transform-for-static-hosting \
            --hosting-base-path "${{ steps.pages.outputs.base_path }}"

      - name: Add root redirect to documentation
        run: |
          cat > ./docs/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=documentation/swiftychain">
              <link rel="canonical" href="documentation/swiftychain">
              <title>SwiftyChain Documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="documentation/swiftychain">SwiftyChain documentation</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
