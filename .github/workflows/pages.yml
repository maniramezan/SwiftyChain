name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Restore SwiftPM caches
        uses: actions/cache@v5
        with:
          path: |
            .build
            .swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-pages-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-pages-
            ${{ runner.os }}-swiftpm-
      - name: Build DocC site
        run: |
          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target SwiftyChain \
            --output-path ./docs \
            --warnings-as-errors \
            --transform-for-static-hosting \
            --hosting-base-path "${{ steps.pages.outputs.base_path }}"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
