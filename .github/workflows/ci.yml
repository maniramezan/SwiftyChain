name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Restore SwiftPM caches
        uses: actions/cache@v5
        with:
          path: |
            .build
            .swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-
      - name: Build
        run: swift build -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test -Xswiftc -warnings-as-errors --enable-code-coverage
      - name: Generate coverage report
        run: |
          xcrun llvm-cov report \
            .build/debug/SwiftyChainPackageTests.xctest/Contents/MacOS/SwiftyChainPackageTests \
            -instr-profile .build/debug/codecov/default.profdata \
            --ignore-filename-regex='.build|Tests'

  documentation:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Restore SwiftPM caches
        uses: actions/cache@v5
        with:
          path: |
            .build
            .swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-docs-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-docs-
            ${{ runner.os }}-swiftpm-
      - name: Build documentation
        run: |
          swift package generate-documentation \
            --target SwiftyChain \
            --warnings-as-errors \
            --disable-indexing
